name: Build & Push Backend Image

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/build-backend.yml

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Pull base image first
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt to pull base image..."
            if docker pull python:3.11-slim-bookworm; then
              echo "Base image pulled successfully"
              break
            fi
            sleep 10
          done

      - name: Build & Push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/lsqz712/pcb-backend:latest
            ${{ secrets.ACR_REGISTRY }}/pcb-platform/pcb-backend:latest
          build-args: |
            REGISTRY_PREFIX=
          cache-from: type=registry,ref=ghcr.io/lsqz712/pcb-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/lsqz712/pcb-backend:buildcache,mode=max
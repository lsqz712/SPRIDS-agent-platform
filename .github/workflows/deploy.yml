name: Deploy to Server

on:
  workflow_run:
    workflows:
      - "Build & Push Frontend Image"
      - "Build & Push Backend Image"
    branches: [main]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate server credentials
        id: validate_credentials
        run: |
          if [[ -z "${{ secrets.SERVER_HOST }}" ]]; then
            echo "SERVER_HOST is not set"
            exit 1
          fi
          if [[ -z "${{ secrets.SERVER_USERNAME }}" ]]; then
            echo "SERVER_USERNAME is not set"
            exit 1
          fi
          if [[ -z "${{ secrets.SERVER_PASSWORD }}" ]]; then
            echo "SERVER_PASSWORD is not set"
            exit 1
          fi
          echo "Credentials validated"

      - name: Transfer docker-compose config via SCP
        id: transfer_config
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          port: ${{ secrets.SERVER_PORT }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "docker-compose.server.yml"
          target: "/opt/pcb-web-platform/"

      - name: Check .env file exists on server
        id: check_env
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          port: ${{ secrets.SERVER_PORT }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            if [ ! -f /opt/pcb-web-platform/.env ]; then
              echo "ERROR: .env file not found at /opt/pcb-web-platform/.env"
              exit 1
            else
              echo ".env file exists"
            fi

      - name: Remote deploy command
        id: deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          port: ${{ secrets.SERVER_PORT }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 900s
          envs: ACR_USER,ACR_PWD,ACR_REG
          script: |
            set -e

            echo "=== Step 1: Login to ACR ==="
            if ! echo "$ACR_PWD" | docker login --username "$ACR_USER" --password-stdin "$ACR_REG"; then
              echo "ERROR: Failed to login to ACR"
              exit 1
            fi
            echo "ACR login successful"

            echo "=== Step 2: Pull latest images ==="
            cd /opt/pcb-web-platform
            if ! docker compose -f docker-compose.server.yml pull; then
              echo "ERROR: Failed to pull images"
              exit 1
            fi
            echo "Images pulled successfully"

            echo "=== Step 3: Start services ==="
            if ! docker compose -f docker-compose.server.yml up -d; then
              echo "ERROR: Failed to start services"
              exit 1
            fi
            echo "Services started successfully"

            echo "=== Step 4: Cleanup old images ==="
            docker image prune -f

            echo "=== Step 5: Show service status ==="
            docker compose -f docker-compose.server.yml ps

            echo "=== Deployment completed ==="
        env:
          ACR_USER: ${{ secrets.ACR_USERNAME }}
          ACR_PWD: ${{ secrets.ACR_PASSWORD }}
          ACR_REG: ${{ secrets.ACR_REGISTRY }}

      - name: Verify deployment
        id: verify
        if: ${{ steps.deploy.outputs.exit_code == 0 }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          port: ${{ secrets.SERVER_PORT }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "=== Verifying deployment ==="
            sleep 10

            echo "Checking frontend..."
            if curl -f http://localhost:80/ > /dev/null 2>&1; then
              echo "Frontend is running"
            else
              echo "WARNING: Frontend not responding"
            fi

            echo "Backend may still be starting up (model loading takes ~2min)"
            echo "Checking backend health..."
            if curl -f http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Backend is running"
            else
              echo "WARNING: Backend not responding yet (may still be loading)"
            fi

            echo "=== Container status ==="
            cd /opt/pcb-web-platform
            docker compose -f docker-compose.server.yml ps
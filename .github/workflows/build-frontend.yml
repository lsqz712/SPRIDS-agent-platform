name: Build & Push Frontend Image

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/build-frontend.yml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GHCR推送权限
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/lsqz712/pcb-frontend:latest
          #cache-from: type=registry,ref=ghcr.io/lsqz712/pcb-frontend:buildcache
          #cache-to: type=registry,ref=ghcr.io/lsqz712/pcb-frontend:buildcache,mode=max

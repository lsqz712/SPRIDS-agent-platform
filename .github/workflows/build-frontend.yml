name: Build & Push Frontend Image

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/build-frontend.yml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base images first
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt to pull node:20-alpine..."
            if docker pull node:20-alpine; then
              echo "node:20-alpine pulled successfully"
              break
            fi
            sleep 10
          done
          for attempt in 1 2 3; do
            echo "Attempt $attempt to pull nginx:alpine..."
            if docker pull nginx:alpine; then
              echo "nginx:alpine pulled successfully"
              break
            fi
            sleep 10
          done

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/lsqz712/pcb-frontend:latest
          build-args: |
            REGISTRY_PREFIX=
          timeout: 300
          retries: 3
services:
  # ── PostgreSQL + Pgvector ──────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: SPRIDS-agent-postgre
    restart: unless-stopped
    environment:
      POSTGRES_DB: SPRIDS_agent
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Lty120712!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d SPRIDS_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: SPRIDS-agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO 对象存储 ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: SPRIDS-agent-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API 端口
      - "9001:9001"   # Console 端口
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Ollama 本地 LLM（可选）─────────────────────────
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: rsod-agent-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   # GPU 加速（取消注释以启用 NVIDIA GPU 支持）
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]

networks:
  default:
    name: SPRIDS-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  # ollama_data:   # 若启用 Ollama，请取消此行注释